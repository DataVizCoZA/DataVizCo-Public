<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calendar Heatmap — preview</title>
<style>
  :root { --ink:#33414A; --muted:#8794A0; --line:#E3E8ED; --bg:#F7F9FB; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:'72',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:1200px; margin:0 auto; padding:24px 20px 56px; }
  h1 { margin:0 0 2px; font-size:20px; }
  p.sub { margin:0 0 16px; color:var(--muted); font-size:13px; }
  .bar { display:flex; flex-wrap:wrap; gap:14px 18px; align-items:center; background:#fff;
         border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:16px; }
  .bar label { font-size:13px; display:flex; align-items:center; gap:6px; }
  .bar input[type=number]{ width:70px; }
  select, input { font:inherit; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px; overflow:auto; }
  #chart { width:100%; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Calendar Heatmap — preview</h1>
  <p class="sub">Same renderer the SAC widget uses, with three years of synthetic daily data. Tweak and re-render.</p>

  <div class="bar">
    <label>Orientation
      <select id="orientation"><option value="horizontal">horizontal</option><option value="vertical">vertical</option></select>
    </label>
    <label>Week starts
      <select id="weekStart"><option value="sunday">sunday</option><option value="monday">monday</option></select>
    </label>
    <label>Calendar
      <select id="calendarType"><option value="standard">standard</option><option value="retail">retail</option></select>
    </label>
    <label>Retail pattern
      <select id="retailPattern"><option value="4-4-5">4-4-5</option><option value="4-5-4">4-5-4</option><option value="5-4-4">5-4-4</option></select>
    </label>
    <label>Retail start <input id="retailStartDate" type="date" value="2013-02-03"></label>
    <label>Cell <input id="cellSize" type="number" value="15" min="6" max="30"></label>
    <label>Low <input id="colorLow" type="color" value="#1A9850"></label>
    <label>Mid <input id="colorMid" type="color" value="#FFFFBF"></label>
    <label>High <input id="colorHigh" type="color" value="#D73027"></label>
    <label>Reverse <input id="reverseScale" type="checkbox"></label>
    <label>Legend <input id="showLegend" type="checkbox" checked></label>
  </div>

  <div class="card"><div id="chart"></div></div>
</div>

<script src="renderer.core.js"></script>
<script>
  function gen() {
    var recs = [], seed = 42;
    function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; }
    for (var y=2013; y<=2015; y++){
      for (var m=0; m<12; m++){
        var dim = new Date(Date.UTC(y, m+1, 0)).getUTCDate();
        for (var d=1; d<=dim; d++){
          var date = new Date(Date.UTC(y, m, d));
          var doy = (date - Date.UTC(y,0,1))/86400000;
          var season = Math.sin((doy/365)*2*Math.PI - 1.2);
          var wd = date.getUTCDay(); var weekend = (wd===0||wd===6)? -0.4 : 0.2;
          var base = 0.5 + 0.35*season + 0.15*weekend + 0.25*(rnd()-0.5);
          var val = Math.round(190 + Math.max(0,Math.min(1,base))*(14151-190));
          recs.push({ date: date, value: val });
        }
      }
    }
    return recs;
  }
  var DATA = gen();

  function draw(){
    var opts = {
      title: "Calendar View",
      subtitle: "Daily values by date, 2013\u20132015",
      orientation: document.getElementById("orientation").value,
      weekStart: document.getElementById("weekStart").value,
      calendarType: document.getElementById("calendarType").value,
      retailPattern: document.getElementById("retailPattern").value,
      retailStartDate: document.getElementById("retailStartDate").value,
      cellSize: Number(document.getElementById("cellSize").value),
      colorLow: document.getElementById("colorLow").value,
      colorMid: document.getElementById("colorMid").value,
      colorHigh: document.getElementById("colorHigh").value,
      reverseScale: document.getElementById("reverseScale").checked,
      showLegend: document.getElementById("showLegend").checked
    };
    document.getElementById("chart").innerHTML = buildCalendarSVG(DATA, opts);
  }

  ["orientation","weekStart","calendarType","retailPattern","retailStartDate","cellSize","colorLow","colorMid","colorHigh","reverseScale","showLegend"]
    .forEach(function(id){ document.getElementById(id).addEventListener("change", draw); });
  draw();
</script>
</body>
</html>
